services:
  postgres:
    image: postgres:16-alpine
    container_name: thread-overflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thread_overflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d thread_overflow']
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: thread-overflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/thread-overflow-assets || true &&
      mc anonymous set download local/thread-overflow-assets || true
      "

volumes:
  postgres_data:
  minio_data:
